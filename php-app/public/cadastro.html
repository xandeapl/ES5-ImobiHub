<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ImobiHub &mdash; Criar Conta</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="auth-page">

  <a href="/" class="auth-logo">
    <svg width="40" height="40" viewBox="0 0 36 36" fill="none" aria-hidden="true">
      <rect width="36" height="36" rx="8" fill="#EBF1FF"/>
      <path d="M18 8L6 18h4v10h6v-6h4v6h6V18h4L18 8Z" fill="#1B4FBB"/>
    </svg>
    <div class="brand-text">
      <span class="brand-name">ImobiHub</span>
      <span class="brand-sub">Conectando Im&oacute;veis &amp; Neg&oacute;cios</span>
    </div>
  </a>

  <div class="auth-card">
    <h1 class="auth-heading">Criar conta de administrador</h1>
    <p class="auth-sub">Preencha os dados para criar sua conta de gerenciamento.</p>

    <form class="auth-form" id="register-form" novalidate>
      <label>
        Nome completo
        <input type="text" name="name" placeholder="Seu nome" autocomplete="name" required>
      </label>

      <label>
        E-mail
        <input type="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
      </label>

      <label>
        Senha
        <div class="password-wrap">
          <input type="password" name="password" id="reg-password" placeholder="Crie uma senha segura" autocomplete="new-password" required>
          <button type="button" class="password-toggle" onclick="togglePassword('reg-password',this)" aria-label="Mostrar senha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </label>

      <label>
        Confirmar senha
        <div class="password-wrap">
          <input type="password" name="password_confirm" id="reg-confirm" placeholder="Repita a senha" autocomplete="new-password" required>
          <button type="button" class="password-toggle" onclick="togglePassword('reg-confirm',this)" aria-label="Mostrar senha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </label>

      <button class="btn btn-primary btn-full" type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Criar conta
      </button>
    </form>

    <div class="auth-link-row">
      J&aacute; tem conta? <a href="/login.html">Fazer login</a>
    </div>
  </div>

  <p class="auth-back-link">
    <a href="/">&larr; Voltar ao cat&aacute;logo p&uacute;blico</a>
  </p>

  <script>
    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      } else {
        input.type = 'password';
        btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }
    }

    const pwInput = document.getElementById('reg-password');
    const fill = document.getElementById('strength-fill');
    pwInput.addEventListener('input', function() {
      const v = this.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (/[A-Z]/.test(v)) score++;
      if (/[0-9]/.test(v)) score++;
      if (/[^A-Za-z0-9]/.test(v)) score++;
      fill.style.width = (score / 4 * 100) + '%';
      fill.style.background = ['#EF4444','#F59E0B','#22C55E','#16A34A'][Math.max(0, score-1)] || '#EF4444';
    });

    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const pw = document.getElementById('reg-password').value;
      const cf = document.getElementById('reg-confirm').value;
      if (pw !== cf) { alert('As senhas não coincidem.'); return; }
      // Placeholder — conectar ao backend de autenticação
      window.location.href = '/dashboard.html';
    });
  </script>
</body>
</html>
