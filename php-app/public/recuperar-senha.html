<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ImobiHub &mdash; Recuperar Senha</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="auth-page">

  <a href="/" class="auth-logo">
    <svg width="40" height="40" viewBox="0 0 36 36" fill="none" aria-hidden="true">
      <rect width="36" height="36" rx="8" fill="#EBF1FF"/>
      <path d="M18 8L6 18h4v10h6v-6h4v6h6V18h4L18 8Z" fill="#1B4FBB"/>
    </svg>
    <div class="brand-text">
      <span class="brand-name">ImobiHub</span>
      <span class="brand-sub">Conectando Im&oacute;veis &amp; Neg&oacute;cios</span>
    </div>
  </a>

  <div class="auth-card" id="form-card">
    <h1 class="auth-heading">Recuperar senha</h1>
    <p class="auth-sub">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>

    <form class="auth-form" id="recover-form" novalidate>
      <label>
        E-mail
        <input type="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
      </label>

      <button class="btn btn-primary btn-full" type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Enviar link de recupera&ccedil;&atilde;o
      </button>
    </form>

    <div class="auth-link-row">
      Lembrou a senha? <a href="/login.html">Fazer login</a>
    </div>
  </div>

  <div class="auth-card" id="success-card" hidden>
    <div style="text-align:center;padding:8px 0">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2" style="margin-bottom:12px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <h2 class="auth-heading" style="margin-bottom:8px">E-mail enviado!</h2>
      <p class="auth-sub" style="margin-bottom:24px">Verifique sua caixa de entrada e siga as instru&ccedil;&otilde;es para redefinir sua senha.</p>
      <a href="/login.html" class="btn btn-primary btn-full">Voltar ao login</a>
    </div>
  </div>

  <p class="auth-back-link">
    <a href="/">&larr; Voltar ao cat&aacute;logo p&uacute;blico</a>
  </p>

  <script>
    document.getElementById('recover-form').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('form-card').hidden = true;
      document.getElementById('success-card').hidden = false;
    });
  </script>
</body>
</html>
