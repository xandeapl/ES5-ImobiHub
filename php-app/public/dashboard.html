<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ImobiHub &mdash; Dashboard</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">
        <svg class="brand-icon" width="32" height="32" viewBox="0 0 36 36" fill="none" aria-hidden="true">
          <rect width="36" height="36" rx="8" fill="#EBF1FF"/>
          <path d="M18 8L6 18h4v10h6v-6h4v6h6V18h4L18 8Z" fill="#1B4FBB"/>
        </svg>
        <span class="brand-name">ImobiHub</span>
      </a>
      <nav class="dash-header-nav">
        <a href="/" class="btn btn-outline-muted btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Ver cat&aacute;logo p&uacute;blico
        </a>
        <a href="/admin/painel.html" class="btn btn-outline-muted btn-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Painel Admin
        </a>
      </nav>
    </div>
  </header>

  <main class="container page-content">

    <div id="notice" hidden></div>

    <div>
      <h1 class="dashboard-title">Dashboard da Imobili&aacute;ria</h1>
      <p class="dashboard-subtitle">Gest&atilde;o de an&uacute;ncios, pre&ccedil;o, status e fotos</p>
    </div>

    <div class="stats-grid">
      <article class="panel stat-card">
        <div class="stat-card-left">
          <span class="stat-label">Total</span>
          <strong class="stat-value" id="stat-total">&#8211;</strong>
        </div>
        <div class="stat-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
      </article>
      <article class="panel stat-card">
        <div class="stat-card-left">
          <span class="stat-label">Dispon&iacute;veis</span>
          <strong class="stat-value" id="stat-available">&#8211;</strong>
        </div>
        <div class="stat-icon green">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        </div>
      </article>
      <article class="panel stat-card">
        <div class="stat-card-left">
          <span class="stat-label">Vendidos</span>
          <strong class="stat-value" id="stat-sold">&#8211;</strong>
        </div>
        <div class="stat-icon amber">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </article>
    </div>

    <section class="panel">
      <h2 class="form-card-title">Cadastrar im&oacute;vel</h2>
      <form id="create-form" enctype="multipart/form-data" class="form-grid">

        <label class="col-full">
          T&iacute;tulo
          <input name="title" placeholder="Ex: Apartamento compacto no Centro" required>
        </label>

        <label>
          Tipo de neg&oacute;cio
          <div class="select-wrap">
            <select name="deal_type" required>
              <option value="comprar">Comprar</option>
              <option value="alugar">Alugar</option>
            </select>
          </div>
        </label>

        <label>
          Tipo de im&oacute;vel
          <div class="select-wrap">
            <select name="property_type" required>
              <option value="">Selecione&hellip;</option>
              <option value="apartamento">Apartamento</option>
              <option value="casa">Casa</option>
              <option value="imovel-comercial">Comercial</option>
              <option value="studio">Studio</option>
              <option value="cobertura">Cobertura</option>
              <option value="terreno">Terreno</option>
            </select>
          </div>
        </label>

        <label>
          Cidade
          <input name="city" placeholder="Ex: Curitiba" required>
        </label>

        <label>
          Bairro
          <input name="neighborhood" placeholder="Ex: Centro" required>
        </label>

        <label>
          Pre&ccedil;o (R$)
          <input name="price" type="number" min="1" placeholder="0" required>
        </label>

        <label>
          &Aacute;rea (m&sup2;)
          <input name="area" type="number" min="1" placeholder="0" required>
        </label>

        <label>
          Quartos
          <input name="bedrooms" type="number" min="0" value="0" required>
        </label>

        <label>
          Banheiros
          <input name="bathrooms" type="number" min="0" value="0" required>
        </label>

        <label>
          Tag de sustentabilidade
          <input name="sustainability_tag" placeholder="Ex: Energia solar, &Aacute;rea verde" required>
        </label>

        <label class="col-full">
          Descri&ccedil;&atilde;o
          <textarea name="description" placeholder="Descreva o im&oacute;vel&hellip;" required></textarea>
        </label>

        <label class="col-full">
          Fotos (JPG/PNG/WebP)
          <div class="file-input-area">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:#64748B"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <input type="file" name="photos[]" multiple accept="image/*">
          </div>
        </label>

        <div class="col-full">
          <button class="btn btn-primary btn-full" type="submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
            Cadastrar im&oacute;vel
          </button>
        </div>
      </form>
    </section>

    <section>
      <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:14px;">An&uacute;ncios cadastrados</h2>
      <div id="property-list" class="property-list"></div>
    </section>

  </main>

  <!-- Template de item da lista -->
  <template id="tpl-property">
    <article class="panel prop-item">
      <div class="prop-img-col"></div>
      <div class="prop-content">
        <div class="prop-header">
          <div>
            <h3 class="prop-title" data-field="title"></h3>
            <p class="prop-location"><span data-field="location"></span></p>
          </div>
          <span class="badge" data-field="sold-badge"></span>
        </div>
        <div class="tags" data-field="tags"></div>
        <div class="prop-actions">
          <form class="price-form" data-action="update-price">
            <span class="price-prefix">R$</span>
            <input type="number" min="1" name="price" required>
            <button class="btn btn-outline btn-sm" type="submit">Atualizar pre&ccedil;o</button>
          </form>
          <form data-action="toggle-sold">
            <button class="btn btn-success btn-sm" type="submit" data-field="sold-btn"></button>
          </form>
          <button class="btn btn-outline-muted btn-sm" type="button" data-action="edit-toggle">Editar an&uacute;ncio</button>
          <button class="btn btn-danger btn-sm" type="button" data-action="delete-toggle">Excluir an&uacute;ncio</button>
        </div>
        <div class="delete-confirm" hidden data-field="delete-confirm">
          Confirmar exclus&atilde;o permanente?
          <form data-action="delete" style="margin-left:auto;display:flex;gap:6px">
            <button class="btn btn-danger btn-sm" type="submit">Sim, excluir</button>
            <button class="btn btn-outline-muted btn-sm" type="button" data-action="delete-cancel">Cancelar</button>
          </form>
        </div>
        <div class="prop-edit-wrap" hidden data-field="edit-form-wrap">
          <form class="form-grid" data-action="edit">
            <label>T&iacute;tulo<input name="title" required></label>
            <label>Tipo de neg&oacute;cio<div class="select-wrap"><select name="deal_type" required><option value="comprar">Comprar</option><option value="alugar">Alugar</option></select></div></label>
            <label>Tipo de im&oacute;vel<div class="select-wrap"><select name="property_type" required><option value="apartamento">Apartamento</option><option value="casa">Casa</option><option value="imovel-comercial">Comercial</option><option value="studio">Studio</option><option value="cobertura">Cobertura</option><option value="terreno">Terreno</option></select></div></label>
            <label>Cidade<input name="city" required></label>
            <label>Bairro<input name="neighborhood" required></label>
            <label>Pre&ccedil;o (R$)<input name="price" type="number" min="1" required></label>
            <label>&Aacute;rea (m&sup2;)<input name="area" type="number" min="1" required></label>
            <label>Quartos<input name="bedrooms" type="number" min="0" required></label>
            <label>Banheiros<input name="bathrooms" type="number" min="0" required></label>
            <label>Tag de sustentabilidade<input name="sustainability_tag" required></label>
            <label class="col-full">Descri&ccedil;&atilde;o<textarea name="description" required></textarea></label>
            <div class="col-full" style="display:flex;gap:8px">
              <button class="btn btn-primary btn-sm" type="submit">Salvar edi&ccedil;&atilde;o</button>
              <button class="btn btn-outline-muted btn-sm" type="button" data-action="edit-cancel">Cancelar</button>
            </div>
          </form>
        </div>
        <div class="thumbs" data-field="photos"></div>
      </div>
    </article>
  </template>

  <footer class="page-footer">&copy; 2025 ImobiHub &mdash; Painel de An&uacute;ncios</footer>
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
