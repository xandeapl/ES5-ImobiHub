<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ImobiHub — Catálogo de Imóveis</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand">
        <svg class="brand-icon" width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
          <rect width="36" height="36" rx="8" fill="#EBF1FF"/>
          <path d="M18 8L6 18h4v10h6v-6h4v6h6V18h4L18 8Z" fill="#1B4FBB"/>
        </svg>
        <div class="brand-text">
          <span class="brand-name">ImobiHub</span>
          <span class="brand-sub">Conectando Imóveis &amp; Negócios</span>
        </div>
      </a>
      <a class="btn btn-dark btn-sm" href="/login.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
        Anunciar imóvel
      </a>
    </div>
  </header>

  <main class="container page-content">

    <section class="panel">
      <form id="filter-form">
        <div class="filters-bar">

          <label>
            Negócio
            <div class="select-wrap">
              <select name="dealType">
                <option value="todos">Todos</option>
                <option value="comprar">Comprar</option>
                <option value="alugar">Alugar</option>
              </select>
            </div>
          </label>

          <label>
            Tipo
            <div class="select-wrap">
              <select name="propertyType">
                <option value="todos">Todos os tipos</option>
                <option value="apartamento">Apartamento</option>
                <option value="casa">Casa</option>
                <option value="imovel-comercial">Comercial</option>
                <option value="studio">Studio</option>
                <option value="cobertura">Cobertura</option>
                <option value="terreno">Terreno</option>
              </select>
            </div>
          </label>

          <label>
            Busca
            <input type="text" name="q" placeholder="Cidade, bairro, descrição…">
          </label>

          <label>
            Ordenação
            <div class="select-wrap">
              <select name="sort">
                <option value="default">Padrão</option>
                <option value="latest">Mais recentes</option>
                <option value="affordable">Mais baratos</option>
              </select>
            </div>
          </label>

          <div class="filters-bottom">
            <button class="btn btn-primary" type="submit">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              Buscar
            </button>
            <label class="checkline">
              <input type="checkbox" name="showSold" value="1">
              Mostrar vendidos
            </label>
          </div>

        </div>
      </form>
    </section>

    <div class="result-header">
      <h2 id="result-count">Resultados (0)</h2>
      <p id="result-filter"></p>
    </div>

    <section id="cards" class="cards"></section>

    <section id="empty-state" class="panel empty-state" hidden>
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin:0 auto 12px;color:#94A3B8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <h3>Nenhum imóvel encontrado</h3>
      <p>Tente ajustar os filtros para encontrar o que procura.</p>
    </section>

  </main>

  <footer class="page-footer">
    © 2025 ImobiHub — Conectando Imóveis &amp; Negócios
  </footer>

  <script type="module" src="/assets/js/catalog.js"></script>
</body>
</html>
</html>
